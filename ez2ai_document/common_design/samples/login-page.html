<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>로그인 — ez2AI Design</title>
  <link rel="stylesheet" href="../tokens/tokens.css">
  <link rel="stylesheet" href="../core.css">
  <link rel="stylesheet" href="../assets/showcase.css">
  <script defer src="../assets/showcase.js"></script>
  <style>
    html, body { height:100%; }
    body { margin:0; display:flex; align-items:center; justify-content:center;
      background: linear-gradient(135deg, #003087 0%, #002468 100%);
    }
    html.dark body { background: linear-gradient(135deg, #0d1117 0%, #161b22 100%); }
    .login-card {
      width: 380px;
      background: var(--ez-card);
      border-radius: 12px;
      padding: 36px 32px 30px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.35);
    }
    .login-card .logo {
      width: 64px; height: 64px;
      border-radius: 16px;
      background: var(--ez-primary);
      color: #fff;
      display:flex; align-items:center; justify-content:center;
      font-size: 28px; font-weight: 700;
      margin: 0 auto 14px;
    }
    .login-card h1 {
      text-align:center;
      font-size: 20px; font-weight: 700;
      color: var(--ez-primary);
      margin: 0 0 4px;
    }
    .login-card .sub {
      text-align:center; font-size: 13px; color: var(--ez-text-muted);
      margin-bottom: 22px;
    }
    .login-field { margin-bottom: 12px; }
    .login-field label { display:block; font-size: 13px; font-weight:600; color: var(--ez-text); margin-bottom:4px; }
    .login-field input {
      width:100%; height: 40px;
      padding: 0 12px;
      border: 1px solid var(--ez-border);
      border-radius: 6px;
      font-size: 14px;
      background: var(--ez-card);
      color: var(--ez-text);
      outline: none;
      box-sizing: border-box;
    }
    .login-field input:focus {
      border-color: var(--ez-primary);
      box-shadow: 0 0 0 2px var(--ez-primary-focus);
    }
    .login-foot {
      margin-top: 16px; display:flex; justify-content:space-between; font-size:12px; color: var(--ez-text-muted);
    }
    .login-foot a { color: var(--ez-primary); }
  </style>
</head>
<body>

<form class="login-card" onsubmit="event.preventDefault()">
  <div class="logo">EZ</div>
  <h1>ez2AI</h1>
  <div class="sub">차세대 업무 시스템</div>

  <div class="login-field">
    <label>테넌트 코드</label>
    <input type="text" value="DEMO" placeholder="예: ACME">
  </div>
  <div class="login-field">
    <label>사용자 ID</label>
    <input type="text" value="hong" placeholder="아이디">
  </div>
  <div class="login-field">
    <label>비밀번호</label>
    <input type="password" value="••••••••">
  </div>

  <label class="xx-yn" style="margin: 6px 0 14px;">
    <input type="checkbox" checked> 로그인 상태 유지 (7일)
  </label>

  <button type="submit" class="eg-btn eg-btn-block eg-btn-primary" style="height:42px; font-size:15px;">로그인</button>

  <div class="login-foot">
    <a href="#">아이디 / 비밀번호 찾기</a>
    <span>v 0.7.8</span>
  </div>
</form>

</body>
</html>
