<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>상세/편집 — ez2AI Design</title>
  <link rel="stylesheet" href="../tokens/tokens.css">
  <link rel="stylesheet" href="../core.css">
  <link rel="stylesheet" href="../assets/showcase.css">
  <script defer src="../assets/showcase.js"></script>
</head>
<body class="dx-page">

<div class="dx-topbar">
  <div><div class="title">샘플 · 상세/편집 모달 (작업오더 등록)</div><div class="meta">2 컬럼 그리드 폼 + 외래키 피커 + 첨부</div></div>
  <div class="actions"><button class="dx-theme-toggle" data-theme-toggle>☽ Dark</button></div>
</div>

<div style="padding:30px; background:var(--ez-bg);">
  <div class="eg-modal size-lg" style="position:static; margin:0 auto; box-shadow:var(--ez-shadow-lg);">
    <div class="eg-modal-header">
      <h2>작업오더 등록</h2>
      <button class="eg-modal-close">✕</button>
    </div>
    <div class="eg-modal-body">
      <div class="xx-form-grid">
        <div class="eg-form-row">
          <label>제목<span class="req">*</span></label>
          <div class="eg-form-control"><input type="text" placeholder="작업명 입력"></div>
        </div>
        <div class="eg-form-row">
          <label>요청유형</label>
          <div class="eg-form-control">
            <select>
              <option>1 · 시설</option><option>2 · 전기</option><option>3 · 방재</option>
              <option>4 · 보안</option><option>5 · 미화</option>
            </select>
          </div>
        </div>
        <div class="eg-form-row">
          <label>중요도</label>
          <div class="eg-form-control">
            <select><option>매우중요</option><option selected>중요</option><option>보통</option></select>
          </div>
        </div>
        <div class="eg-form-row">
          <label>상태</label>
          <div class="eg-form-control">
            <select>
              <option>작업요청</option><option selected>작업접수</option><option>작업시작</option>
              <option>작업완료</option>
            </select>
          </div>
        </div>
        <div class="eg-form-row">
          <label>요청자<span class="req">*</span></label>
          <div class="eg-form-control"><input type="text" value="홍길동"></div>
        </div>
        <div class="eg-form-row">
          <label>담당자</label>
          <div class="eg-form-control">
            <div style="display:flex; flex-direction:column; gap:6px;">
              <input type="text" placeholder="이름 검색">
              <select size="3">
                <option>김영희 [EMP-002] · 운영팀</option>
                <option>이철수 [EMP-003] · 시설관리실</option>
                <option>박지수 [EMP-004] · 전기팀</option>
              </select>
            </div>
          </div>
        </div>
        <div class="eg-form-row">
          <label>요청일</label>
          <div class="eg-form-control"><input type="date" value="2026-05-19"></div>
        </div>
        <div class="eg-form-row">
          <label>완료기한</label>
          <div class="eg-form-control"><input type="date" value="2026-05-25"></div>
        </div>
        <div class="eg-form-row">
          <label>대상자산</label>
          <div class="eg-form-control">
            <div style="display:flex; flex-direction:column; gap:6px;">
              <input type="text" placeholder="자산명/ID 검색">
              <select size="3">
                <option>AHU-001 · 공조기 #01</option>
                <option selected>AHU-002 · 공조기 #02</option>
                <option>GEN-001 · 비상발전기</option>
              </select>
            </div>
          </div>
        </div>
        <div class="eg-form-row">
          <label>발생장소</label>
          <div class="eg-form-control"><input type="text" placeholder="예: 본관 2층 기계실"></div>
        </div>
        <div class="eg-form-row xx-fullwidth">
          <label>작업 내용<span class="req">*</span></label>
          <div class="eg-form-control"><textarea placeholder="상세 작업 내용을 입력하세요"></textarea></div>
        </div>
        <div class="eg-form-row xx-fullwidth">
          <label>첨부</label>
          <div class="eg-form-control">
            <div class="xx-attach-list">
              <div class="xx-attach-item"><span>📸 현장사진_001.jpg <span class="xx-text-soft xx-fs-xs">3.1 MB</span></span><button>✕</button></div>
            </div>
            <div class="xx-attach-add" style="margin-top:6px;"><label>+ 파일 추가</label></div>
          </div>
        </div>
      </div>
    </div>
    <div class="eg-modal-footer">
      <button class="eg-btn eg-btn-default">취소</button>
      <button class="eg-btn eg-btn-primary">저장</button>
    </div>
  </div>
</div>

</body>
</html>
